<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#F8FAFC" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Perbaikan Postur Raihan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #F8FAFC;
      color: #1E293B;
      overscroll-behavior: none;
    }
    body { overflow: hidden; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    :root {
      --background: #F8FAFC;
      --surface: #F4F3FA;
      --primary: #93A5CF;
      --lavender: #D6CBE5;
      --border-light: #EBE7F3;
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --text-accent: #7A8CBA;
      --danger: #EF4444;
      --danger-bg: rgba(239, 68, 68, 0.03);
      --danger-border: rgba(239, 68, 68, 0.18);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    .app { position: fixed; inset: 0; background: var(--background); overflow: hidden; }
    .screen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      background: var(--background); transform: translateX(100%);
      opacity: 0;
      transition: transform 320ms cubic-bezier(0.32, 0.72, 0, 1),
                  opacity 320ms cubic-bezier(0.32, 0.72, 0, 1);
      overflow: hidden;
    }
    .screen.active { transform: translateX(0); opacity: 1; }
    .screen.exit { transform: translateX(-6%) scale(0.97); opacity: 0; }
    #screen-home { transform: translateX(0); opacity: 1; }
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* Halaman Home */
    .home-padding { padding: calc(var(--safe-top) + 32px) 24px 48px; text-align: center; }
    .home-header { margin-bottom: 32px; display: flex; flex-direction: column; gap: 8px; }
    .home-subtitle { font-size: 13px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-accent); }
    .home-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 34px; }
    .day-card {
      position: relative; display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: 20px; padding: 16px 20px; margin-bottom: 10px; min-height: 72px; overflow: hidden;
      box-shadow: 0 8px 16px rgba(30, 41, 59, 0.03);
      transition: opacity 0.2s, transform 0.2s;
      animation: cardIn 380ms cubic-bezier(0.32, 0.72, 0, 1) both;
      text-align: left;
    }
    .day-card-left { flex: 1; min-width: 0; }
    .day-card-title { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
    .day-card-focus { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .day-card-right { display: flex; flex-direction: column; align-items: flex-end; margin-left: 16px; }
    .day-card-date { font-size: 24px; font-weight: 600; letter-spacing: -1px; line-height: 28px; font-variant-numeric: tabular-nums; }
    .day-card-month { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-accent); margin-top: 2px; }
    .day-card-accent { display: none; }
    .day-card.is-next { border: 1.5px solid var(--primary); background: #F0F4FB; box-shadow: 0 8px 20px rgba(147,165,207,0.18); }
    .day-card.is-past { opacity: 0.4; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .day-card .ripple { position: absolute; border-radius: 50%; background: rgba(147,165,207,0.35); transform: scale(0); animation: rippleAnim 500ms ease-out forwards; pointer-events: none; }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* Halaman Exercise */
    .top-bar { padding: calc(var(--safe-top) + 12px) 24px 8px; display: flex; align-items: center; justify-content: space-between; }
    .icon-btn { width: 40px; height: 40px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border-light); display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
    .icon-btn:active { opacity: 0.7; }
    .icon-btn svg { width: 22px; height: 22px; stroke: var(--text-primary); }
    .progress-text { font-size: 13px; font-weight: 600; letter-spacing: 1.5px; color: var(--text-accent); font-variant-numeric: tabular-nums; }
    .exercise-content { padding: 16px 24px 200px; transition: opacity 180ms ease, transform 180ms ease; }
    .exercise-content.fade-out { opacity: 0; transform: translateX(-14px); }
    .exercise-content.fade-in { opacity: 0; transform: translateX(14px); transition: none; }
    .exercise-content.fade-in.playing { opacity: 1; transform: translateX(0); transition: opacity 220ms ease, transform 220ms ease; }
    .exercise-label { font-size: 12px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-accent); margin-bottom: 8px; }
    .exercise-name { font-size: 30px; font-weight: 700; letter-spacing: -0.8px; line-height: 38px; margin-bottom: 20px; }

    /* Chip Row */
    .chip-row { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
    .rep-chip { display: inline-flex; align-items: baseline; background: var(--surface); border: 1px solid var(--border-light); padding: 10px 18px; border-radius: 999px; }
    .rep-chip-num { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; font-variant-numeric: tabular-nums; }
    .rep-chip-mute { font-size: 13px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.5px; margin: 0 4px; }
    .rest-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border-light); padding: 10px 14px; border-radius: 999px; }
    .rest-chip-icon { width: 14px; height: 14px; stroke: var(--text-accent); flex-shrink: 0; fill: none; }
    .rest-chip-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.3px; }
    .rest-chip-val { font-size: 13px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.2px; margin-left: 2px; font-variant-numeric: tabular-nums; }

    /* Video Thumb */
    .video-thumb { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; background: var(--surface); margin-bottom: 28px; cursor: pointer; transition: opacity 0.2s; }
    .video-thumb:active { opacity: 0.85; }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-thumb-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.25); }
    .play-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 64px; height: 64px; border-radius: 32px; background: rgba(15, 23, 42, 0.85); display: flex; align-items: center; justify-content: center; }
    .play-circle svg { width: 26px; height: 26px; fill: #FFF; margin-left: 3px; }
    .video-thumb-badge { position: absolute; bottom: 12px; left: 12px; padding: 4px 10px; background: rgba(255,255,255,0.92); border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .video-placeholder { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: var(--surface); }
    .video-placeholder svg { width: 36px; height: 36px; stroke: var(--text-accent); opacity: 0.35; fill: none; }
    .video-placeholder span { font-size: 12px; font-weight: 600; color: var(--text-accent); opacity: 0.55; letter-spacing: 0.5px; }

    /* Info Cards */
    .info-cards { display: flex; flex-direction: column; gap: 10px; }
    .info-card { display: flex; align-items: flex-start; gap: 12px; background: var(--surface); border: 1px solid var(--border-light); border-radius: 16px; padding: 14px 16px; }
    .info-card-danger { background: var(--danger-bg); border-color: var(--danger-border); }
    .info-card-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .info-card-icon svg { width: 15px; height: 15px; stroke: var(--text-accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .info-card-danger .info-card-icon svg { stroke: var(--danger); }
    .info-card-content { flex: 1; min-width: 0; }
    .info-card-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-accent); margin-bottom: 6px; }
    .info-card-danger .info-card-label { color: var(--danger); }
    .info-card-text { font-size: 15px; line-height: 23px; color: var(--text-secondary); letter-spacing: -0.1px; }

    /* Bottom Bar */
    .bottom-bar { position: absolute; left: 0; right: 0; bottom: 0; background: var(--background); padding: 14px 24px calc(var(--safe-bottom) + 16px); border-top: 1px solid var(--border-light); }
    .lanjut-btn { width: 100%; padding: 18px 20px; border-radius: 16px; background: var(--text-primary); color: #FFF; font-size: 15px; font-weight: 600; letter-spacing: -0.2px; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lanjut-btn:active { opacity: 0.85; transform: scale(0.99); }
    .dot-row { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
    .dot { width: 6px; height: 6px; border-radius: 3px; background: var(--border-light); transition: width 0.3s, background 0.3s; }
    .dot.active { width: 24px; background: var(--primary); }

    /* Video Modal */
    .video-modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0);
      pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 300ms ease;
    }
    .video-modal.open { background: rgba(0,0,0,0.65); pointer-events: all; }
    .video-sheet {
      width: 80%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden;
      opacity: 0; transform: scale(0.92);
      transition: opacity 300ms ease, transform 300ms cubic-bezier(0.32, 0.72, 0, 1);
    }
    .video-modal.open .video-sheet { opacity: 1; transform: scale(1); }
    .video-modal-iframe-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .video-modal-iframe-wrap iframe { width: 100%; height: 100%; border: 0; }

    /* Halaman Selesai */
    .selesai-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: calc(var(--safe-top) + 24px) 32px 24px; }
    .badge-wrap { width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; margin-bottom: 36px; position: relative; }
    .badge { width: 110px; height: 110px; border-radius: 55px; background: var(--primary); display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 24px rgba(147,165,207,0.35); animation: badgeBounce 700ms cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .badge svg { width: 56px; height: 56px; stroke: #FFF; stroke-width: 3; fill: none; }
    .ring-pulse { position: absolute; width: 110px; height: 110px; border-radius: 55px; border: 2px solid var(--lavender); animation: pulse 1600ms ease-out infinite; animation-delay: 700ms; opacity: 0; }
    @keyframes badgeBounce { 0% { opacity: 0; transform: scale(0.2); } 60% { opacity: 1; } 100% { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 0; transform: scale(1.45); } }
    .selesai-body { display: flex; flex-direction: column; align-items: center; opacity: 0; animation: selesaiFadeIn 400ms ease both; animation-delay: 650ms; }
    .selesai-title { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px; }
    .selesai-subtitle { font-size: 16px; font-weight: 500; letter-spacing: -0.2px; color: var(--text-secondary); margin-bottom: 28px; }
    .alhamdulillah-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
    .alhamdulillah-line { width: 28px; height: 1px; background: var(--border-light); }
    .alhamdulillah { font-size: 22px; font-weight: 600; font-style: italic; letter-spacing: -0.5px; color: var(--primary); }
    .stats-row { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border-light); border-radius: 20px; padding: 18px 28px; }
    .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 88px; }
    .stat-num { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-accent); margin-top: 4px; }
    .stat-divider { width: 1px; height: 36px; background: var(--border-light); margin: 0 24px; }
    @keyframes selesaiFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .selesai-bottom { padding: 14px 24px calc(var(--safe-bottom) + 16px); }
  </style>
</head>
<body>
<div class="app">

  <!-- Halaman Home -->
  <div class="screen active" id="screen-home">
    <div class="scroll-area">
      <div class="home-padding">
        <div class="home-header">
          <div class="home-subtitle">JULI 2026</div>
          <div class="home-title">Perbaikan Postur<br/>Raihan</div>
        </div>
        <div id="day-cards"></div>
      </div>
    </div>
  </div>

  <!-- Halaman Exercise -->
  <div class="screen" id="screen-exercise">
    <div class="top-bar">
      <button class="icon-btn" id="btn-back" aria-label="Kembali">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="progress-text" id="progress-text">1 / 4</div>
    </div>
    <div class="scroll-area">
      <div class="exercise-content">
        <div class="exercise-label" id="exercise-label">GERAKAN 1</div>
        <div class="exercise-name" id="exercise-name">—</div>
        <div class="chip-row">
          <div class="rep-chip">
            <span class="rep-chip-num" id="chip-sets">3</span>
            <span class="rep-chip-mute">set</span>
            <span class="rep-chip-num">×</span>
            <span class="rep-chip-num" id="chip-reps">10</span>
            <span class="rep-chip-mute" id="chip-unit">rep</span>
          </div>
          <div class="rest-chip">
            <svg class="rest-chip-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
            <span class="rest-chip-label">istirahat</span>
            <span class="rest-chip-val" id="chip-istirahat">2 menit</span>

        </div>
        <div class="video-thumb" id="video-thumb">
          <img id="video-thumb-img" alt="Video thumbnail" />
          <div class="video-placeholder" id="video-placeholder">
            <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M10 8l6 4-6 4V8z"/></svg>
            <span>Video segera hadir</span>
          </div>
          <div class="video-thumb-overlay" id="video-thumb-overlay"></div>
          <div class="play-circle" id="video-play-circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
          <div class="video-thumb-badge" id="video-thumb-badge">YouTube</div>
        </div>
        <div class="info-cards">
          <div class="info-card">
            <div class="info-card-icon">
              <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5"/><circle cx="8" cy="8" r="2.5" fill="currentColor" stroke="none"/></svg>
            </div>
            <div class="info-card-content">
              <div class="info-card-label">Tujuan</div>
              <div class="info-card-text" id="tujuan-text">—</div>
            </div>
          </div>
          <div class="info-card info-card-danger">
            <div class="info-card-icon">
              <svg viewBox="0 0 16 16"><path d="M8 2.5L14 13.5H2L8 2.5z"/><line x1="8" y1="7" x2="8" y2="10"/><circle cx="8" cy="12" r="0.8" fill="currentColor" stroke="none"/></svg>
            </div>
            <div class="info-card-content">
              <div class="info-card-label">Kesalahan Fatal</div>
              <div class="info-card-text" id="kesalahan-text">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="lanjut-btn" id="btn-lanjut">Lanjut →</button>
      <div class="dot-row" id="dot-row"></div>
    </div>
  </div>

  <!-- Halaman Selesai -->
  <div class="screen" id="screen-selesai">
    <div class="selesai-container">
      <div class="badge-wrap">
        <div class="ring-pulse"></div>
        <div class="badge"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>
      </div>
      <div class="selesai-body">
        <div class="selesai-title">Selesai!</div>
        <div class="selesai-subtitle" id="selesai-subtitle">Latihan Senin · Upper A done ✓</div>
        <div class="alhamdulillah-wrap">
          <div class="alhamdulillah-line"></div>
          <div class="alhamdulillah">Alhamdulillah</div>
          <div class="alhamdulillah-line"></div>
        </div>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num" id="selesai-gerakan">4</div><div class="stat-label">GERAKAN</div></div>
          <div class="stat-divider"></div>
          <div class="stat-box"><div class="stat-num" id="selesai-total-set">12</div><div class="stat-label">TOTAL SET</div></div>
        </div>
      </div>
    </div>
    <div class="selesai-bottom">
      <button class="lanjut-btn" id="btn-kembali">Kembali ke Beranda</button>
    </div>
  </div>

  <!-- Video Modal -->
  <div class="video-modal" id="video-modal" role="dialog" aria-modal="true">
    <div class="video-sheet">
      <div class="video-modal-iframe-wrap" id="iframe-wrap"></div>
    </div>
  </div>

</div>

  const WORKOUTS = [

  const SENIN_EXERCISES = [

  const SELASA_EXERCISES = [
    {
      id: 1, name: "Leg Press", sets: 3, reps: 10, unit: "rep", ytId: "", istirahat: "2 menit",

  const KAMIS_EXERCISES = [
    {
      id: 1, name: "Incline Dumbbell Press (30°)", sets: 3, reps: 10, unit: "rep", ytId: "8fXfwG4ftaQ", isShorts: true, istirahat: "2 menit",
      tujuan: "Mengisi dada bagian atas agar kemeja terlihat bidang dan penuh.",
      kesalahan: "Sudut kursi terlalu tinggi (>45°) sehingga beban pindah ke bahu depan, bukan dada atas."
    },
    {
      id: 2, name: "Seated Cable Row", sets: 3, reps: 12, unit: "rep", ytId: "LyZH4UGdDTc", isShorts: true, istirahat: "90 dtk",
      tujuan: "Menebalkan punggung tengah agar postur berdiri tegap.",
      kesalahan: "Bahu ikut bungkuk ke depan saat melepaskan beban. Dada harus tetap tegak, rasakan belikat saling menjepit di belakang."
    },
    {
      id: 3, name: "Seated Face Pull", sets: 3, reps: 15, unit: "rep", ytId: "hyBmEmv03_U", isShorts: false, istirahat: "60–90 dtk",
      tujuan: "Menjaga frekuensi stimulasi bahu belakang agar perbaikan postur lebih cepat.",
      kesalahan: "Kepala maju ke depan menjemput tali kabel. Kepala harus diam, tali yang ditarik ke arah dahi."
    },
    {
      id: 4, name: "Tricep Rope Pushdown", sets: 3, reps: 12, unit: "rep", ytId: "u36jNfqh8_U", isShorts: true, istirahat: "60 dtk",
      tujuan: "Mengisolasi otot tricep agar lengan baju bagian belakang terisi padat.",
      kesalahan: "Siku membuka ke samping atau ikut bergerak naik-turun. Siku harus diam dan menempel di sisi rusuk."
    },
  ];

  const JUMAT_EXERCISES = [
    {
      id: 1, name: "Hack Squat", sets: 3, reps: 10, unit: "rep", ytId: "", istirahat: "2 menit",
      tujuan: "Melatih paha depan dengan stabilitas tinggi tanpa risiko goyang.",
      kesalahan: "Tumit terangkat dari papan pijakan saat posisi di bawah. Seluruh telapak kaki harus menempel penuh sepanjang gerakan."
    },
    {
      id: 2, name: "Lying Leg Curl", sets: 3, reps: 12, unit: "rep", ytId: "", istirahat: "90 dtk",
      tujuan: "Isolasi paha belakang untuk mengimbangi dominasi kekuatan paha depan.",
      kesalahan: "Pinggul terangkat dari bantalan mesin saat kaki menekuk beban. Pinggul harus tetap ditekan ke bawah."
    },
    {
      id: 3, name: "Seated Calf Raise", sets: 3, reps: 20, unit: "rep", ytId: "", istirahat: "60 dtk",
      tujuan: "Melatih otot betis bagian dalam agar kaki terlihat proporsional dari samping.",
      kesalahan: "Gerakan setengah-setengah. Turunkan tumit sedalam mungkin hingga betis tertarik, lalu jinjit setinggi mungkin."
    },
    {
      id: 4, name: "Deadbug", sets: 3, reps: 10, unit: "rep/sisi", ytId: "", istirahat: "60 dtk",
      tujuan: "Latihan stabilitas inti untuk mengunci posisi panggul agar tidak condong ke depan.",
      kesalahan: "Punggung bawah melengkung — ada celah antara punggung dan lantai. Punggung bawah wajib ditekan rata ke lantai selama tangan dan kaki bergerak."
    },
  ];

  const SELESAI_INFO = {
    senin:  { subtitle: "Latihan Senin · Upper A done ✓" },
    selasa: { subtitle: "Latihan Selasa · Lower A done ✓" },
    kamis:  { subtitle: "Latihan Kamis · Upper B done ✓" },
    jumat:  { subtitle: "Latihan Jumat · Lower B done ✓" },
  };

  function getUpcomingDate(dates) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    return dates.find(d => new Date(PROGRAM_YEAR, PROGRAM_MONTH, d).getTime() >= today) || dates[dates.length - 1];
  }

  function renderHome() {
    const now = new Date();
    const todayTs = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

    let closestDiff = Infinity, closestId = null;
    WORKOUTS.forEach(w => {
      const d = getUpcomingDate(w.dates);
      const ts = new Date(PROGRAM_YEAR, PROGRAM_MONTH, d).getTime();
      const diff = ts - todayTs;
      if (diff >= 0 && diff < closestDiff) { closestDiff = diff; closestId = w.id; }
    });

    document.getElementById("day-cards").innerHTML = WORKOUTS.map((w, idx) => {
      const upcoming = String(getUpcomingDate(w.dates)).padStart(2, "0");
      const upcomingTs = new Date(PROGRAM_YEAR, PROGRAM_MONTH, parseInt(upcoming, 10)).getTime();
      const isPast = upcomingTs < todayTs;
      const isNext = w.id === closestId;
      const extraClass = isNext ? " is-next" : isPast ? " is-past" : "";
      return `
        <div class="day-card${extraClass}" data-id="${w.id}" style="animation-delay:${idx * 80}ms">
          <div class="day-card-left">
            <div class="day-card-title">${w.day}</div>
            <div class="day-card-focus">${w.focus}</div>
          </div>
          <div class="day-card-right">
            <div class="day-card-date">${upcoming}</div>
            <div class="day-card-month">${MONTH_LABEL}</div>
          </div>
          <div class="day-card-accent"></div>
        </div>`;
    }).join("");

    document.querySelectorAll(".day-card").forEach(el => {
      el.addEventListener("click", e => {
        const rect = el.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
        el.appendChild(ripple);
        setTimeout(() => ripple.remove(), 520);
        const id = el.dataset.id;
        setTimeout(() => { location.hash = "#/" + id + "/1"; }, 120);
      });
    });
  }

  function getExercises(hari) {
    if (hari === "selasa") return SELASA_EXERCISES;
    if (hari === "kamis")  return KAMIS_EXERCISES;
    if (hari === "jumat")  return JUMAT_EXERCISES;
    return SENIN_EXERCISES;
  }

  function getHariFromHash() {
    const h = location.hash;
    if (h.startsWith("#/selasa/")) return "selasa";
    if (h.startsWith("#/kamis/"))  return "kamis";
    if (h.startsWith("#/jumat/"))  return "jumat";
    return "senin";
  }

  function renderExercise(idNum, exercises) {
    const ex = exercises.find(e => e.id === idNum);
    if (!ex) { location.hash = "#/"; return; }
    const total = exercises.length;

    document.getElementById("progress-text").textContent = idNum + " / " + total;
    document.getElementById("exercise-label").textContent = "GERAKAN " + idNum;
    document.getElementById("exercise-name").textContent = ex.name;
    document.getElementById("chip-sets").textContent = ex.sets;
    document.getElementById("chip-reps").textContent = ex.reps;
    document.getElementById("chip-unit").textContent = ex.unit || "rep";
    document.getElementById("chip-istirahat").textContent = ex.istirahat;
    document.getElementById("tujuan-text").textContent = ex.tujuan;
    document.getElementById("kesalahan-text").textContent = ex.kesalahan;

    const hasVideo = !!ex.ytId;
    document.getElementById("video-thumb-img").style.display = hasVideo ? "block" : "none";
    if (hasVideo) document.getElementById("video-thumb-img").src = "https://img.youtube.com/vi/" + ex.ytId + "/hqdefault.jpg";
    document.getElementById("video-placeholder").style.display = hasVideo ? "none" : "flex";
    document.getElementById("video-thumb-overlay").style.display = hasVideo ? "block" : "none";
    document.getElementById("video-play-circle").style.display = hasVideo ? "flex" : "none";
    document.getElementById("video-thumb-badge").textContent = ex.isShorts ? "YouTube Shorts" : "YouTube";
    document.getElementById("video-thumb-badge").style.display = hasVideo ? "block" : "none";
    document.getElementById("video-thumb").dataset.ytId = ex.ytId || "";
    document.getElementById("video-thumb").style.cursor = hasVideo ? "pointer" : "default";

    const isLast = idNum === total;
    if (isLast) {
      const hari = getHariFromHash();
      const totalSets = exercises.reduce((sum, e) => sum + e.sets, 0);
      document.getElementById("selesai-subtitle").textContent = SELESAI_INFO[hari].subtitle;
      document.getElementById("selesai-gerakan").textContent = total;
      document.getElementById("selesai-total-set").textContent = totalSets;
    }

    const next = isLast ? null : exercises.find(e => e.id === idNum + 1);
    const btn = document.getElementById("btn-lanjut");
    btn.textContent = isLast ? "Selesai →" : ("Lanjut → " + next.name);
    btn.dataset.target = isLast ? "selesai" : String(idNum + 1);

    document.getElementById("dot-row").innerHTML = exercises.map(e =>
      '<div class="dot' + (e.id === idNum ? " active" : "") + '"></div>'
    ).join("");
    document.querySelector("#screen-exercise .scroll-area").scrollTop = 0;
  }

  const screens = {
    home: document.getElementById("screen-home"),
    exercise: document.getElementById("screen-exercise"),
    selesai: document.getElementById("screen-selesai"),
  };

  function showScreen(name) {
    const current = Object.values(screens).find(s => s.classList.contains("active"));
    const next = screens[name];
    if (current && current !== next) {
      current.classList.add("exit");
      setTimeout(() => current.classList.remove("active", "exit"), 340);
    }
    next.classList.add("active");
    if (name === "selesai") {
      const badge = next.querySelector(".badge");
      const body  = next.querySelector(".selesai-body");
      const ring  = next.querySelector(".ring-pulse");
      [badge, body, ring].forEach(el => { el.style.animation = "none"; el.offsetHeight; el.style.animation = ""; });
    }
  }

  function handleRoute() {
    const hash = location.hash || "#/";
    if (hash === "#/" || hash === "") {
      showScreen("home");
    } else if (
      hash === "#/senin/selesai"  ||
      hash === "#/selasa/selesai" ||
      hash === "#/kamis/selesai"  ||
      hash === "#/jumat/selesai"
    ) {
      showScreen("selesai");
    } else {
      const m = hash.match(/^#\/(senin|selasa|kamis|jumat)\/(\d+)$/);
      if (m) {
        const hari  = m[1];
        const idNum = parseInt(m[2], 10);
        const exercises = getExercises(hari);
        if (idNum >= 1 && idNum <= exercises.length) {
          renderExercise(idNum, exercises);
          showScreen("exercise");
        } else {
          location.hash = "#/";
        }
      } else {
        location.hash = "#/";
      }
    }
  }

  const modal     = document.getElementById("video-modal");
  const iframeWrap = document.getElementById("iframe-wrap");

  function openVideo(ytId) {
    iframeWrap.innerHTML = '<iframe src="https://www.youtube.com/embed/' + ytId + '?autoplay=1&playsinline=1&rel=0&modestbranding=1" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>';
    modal.classList.add("open");
  }
  function closeVideo() {
    modal.classList.remove("open");
    setTimeout(() => { iframeWrap.innerHTML = ""; }, 300);
  }

  modal.addEventListener("click", e => { if (e.target === modal) closeVideo(); });
  document.getElementById("video-thumb").addEventListener("click", () => {
    const ytId = document.getElementById("video-thumb").dataset.ytId;
    if (ytId) openVideo(ytId);
  });
  document.getElementById("btn-back").addEventListener("click", () => {
    if (history.length > 1) history.back(); else location.hash = "#/";
  });
  document.getElementById("btn-lanjut").addEventListener("click", e => {
    const t    = e.currentTarget.dataset.target;
    const hari = getHariFromHash();
    if (t === "selesai") { location.hash = "#/" + hari + "/selesai"; return; }
    if (!t) return;
    const content = document.querySelector(".exercise-content");
    content.classList.add("fade-out");
    setTimeout(() => {
      location.hash = "#/" + hari + "/" + t;
      content.classList.remove("fade-out");
      content.classList.add("fade-in");
      requestAnimationFrame(() => requestAnimationFrame(() => {
        content.classList.add("playing");
        setTimeout(() => content.classList.remove("fade-in", "playing"), 250);
      }));
    }, 180);
  });
  document.getElementById("btn-kembali").addEventListener("click", () => location.hash = "#/");

  renderHome();
  window.addEventListener("hashchange", handleRoute);
  handleRoute();
</script>
</body>
</html>
